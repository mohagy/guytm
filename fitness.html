<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness & Zones - Guyana VMS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js?v=1.3"></script>
</head>

<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <h1>Administrative Configuration</h1>

        <div class="card" style="margin-top:2rem;">
            <h3>Certificates of Fitness (Inspections)</h3>
            <div style="margin-top: 1rem; overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Vehicle</th>
                            <th>Issue Date</th>
                            <th>Expiry Date</th>
                            <th>Result</th>
                            <th>Comments</th>
                            <th class="admin-only" style="display:none;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="fitness-table-body">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
            <div id="admin-actions-fit" style="display:none; margin-top:1rem;">
                <button onclick="document.getElementById('fit-modal').style.display='block'">+ Record New
                    Inspection</button>
            </div>
        </div>

        <div class="card">
            <h3>Operating Zones</h3>
            <ul id="zone-list" style="list-style:none; margin-top:1rem;">
                <!-- Populated via JS -->
            </ul>
        </div>
    </div>

    <!-- Fitness Modal -->
    <div id="fit-modal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div class="card" style="max-width: 500px; margin: 5% auto; position: relative;">
            <button onclick="document.getElementById('fit-modal').style.display='none'"
                style="position:absolute; right:1rem; top:1rem; background:none; color:var(--text); font-size:1.5rem;">&times;</button>
            <h3>Technical Inspection Report</h3>
            <form id="fitness-form" style="margin-top:1.5rem;">
                <div class="form-group">
                    <label>Vehicle Reg Number</label>
                    <input type="text" id="fit_reg" required>
                </div>
                <div class="form-group">
                    <label>Inspection Result</label>
                    <select id="fit_result">
                        <option value="Pass">Pass - Fit for Road</option>
                        <option value="Fail">Fail - Defects Found</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Comments / Noted Defects</label>
                    <textarea id="fit_comments" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Expiry Date (Next Inspection)</label>
                    <input type="date" id="fit_expiry" required>
                </div>
                <button type="submit" style="width:100%;">Save Certificate</button>
            </form>
        </div>
    </div>

    <script>
        VMS.init().then(() => {
            VMS.requireLogin();
            VMS.injectSidebar();

            if (VMS.isAdmin()) {
                document.getElementById('admin-actions-fit').style.display = 'block';
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
            }

            window.deleteFitness = function (id) {
                if (confirm('Delete this fitness record?')) {
                    VMS.deleteFitness(id);
                    renderFitness();
                }
            };

            window.manageFitness = function (id) {
                alert(`Technical Inspection Details for ID: ${id}\nComplete test history and pass/fail criteria would be here.`);
            };

            if (VMS.isAdmin()) {
                document.getElementById('admin-actions-fit').style.display = 'block';
            }

            window.deleteFitness = function (id) {
                if (confirm('Delete this fitness record?')) {
                    VMS.deleteFitness(id);
                    renderFitness();
                }
            };

            function renderFitness() {
                const certs = JSON.parse(localStorage.getItem('vms_fitness')) || [];
                const tbody = document.getElementById('fitness-table-body');
                tbody.innerHTML = certs.map(c => `
                    <tr>
                        <td><strong>${c.reg}</strong></td>
                        <td>${c.issue}</td>
                        <td>${c.expiry}</td>
                        <td><span class="badge ${c.result === 'Pass' ? 'badge-active' : 'badge-expired'}">${c.result}</span></td>
                        <td>${c.comments}</td>
                        <td>
                            <button onclick="manageFitness(${c.id})" style="padding:0.4rem 0.8rem; font-size:0.8rem; background:var(--sidebar-bg);">Manage</button>
                            ${VMS.isAdmin() ? `<button onclick="deleteFitness(${c.id})" style="padding:0.4rem 0.8rem; font-size:0.8rem; background:var(--danger); margin-left:0.5rem;">Delete</button>` : ''}
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="' + (VMS.isAdmin() ? 6 : 5) + '" style="text-align:center;">No inspection records active.</td></tr>';
            }

            function renderZones() {
                const zones = JSON.parse(localStorage.getItem('vms_zones'));
                const list = document.getElementById('zone-list');
                list.innerHTML = zones.map(z => `
                    <li style="padding:0.75rem; border-bottom:1px solid #f0f4f8; display:flex; justify-content:space-between; align-items:center;">
                        ${z} <span class="badge badge-active">Active Region</span>
                    </li>
                `).join('');
            }

            document.getElementById('fitness-form').addEventListener('submit', (e) => {
                e.preventDefault();
                VMS.addFitness({
                    reg: document.getElementById('fit_reg').value,
                    result: document.getElementById('fit_result').value,
                    comments: document.getElementById('fit_comments').value,
                    expiry: document.getElementById('fit_expiry').value,
                    issue: new Date().toISOString().split('T')[0]
                });
                document.getElementById('fit-modal').style.display = 'none';
                renderFitness();
                alert('Fitness record updated.');
            });

            renderFitness();
            renderZones();
        });
    </script>
</body>

</html>
