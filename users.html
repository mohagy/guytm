<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Guyana VMS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js?v=1.1"></script>
</head>

<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>User & Role Management</h1>
            <button onclick="document.getElementById('user-modal').style.display='flex'">Add New User</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- Users will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="user-modal" class="modal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
        <div class="card" style="width:100%; max-width:500px;">
            <h3>Register New User</h3>
            <form id="user-form" style="margin-top:1.5rem;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="new_username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="new_password" required>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="new_fullname" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="new_email" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="new_role">
                        <option value="Admin">Admin</option>
                        <option value="Licensing Officer">Licensing Officer</option>
                        <option value="Vehicle Owner">Vehicle Owner</option>
                    </select>
                </div>
                <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                    <button type="submit" style="flex:1;">Create Account</button>
                    <button type="button" onclick="document.getElementById('user-modal').style.display='none'"
                        style="flex:1; background:var(--danger);">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        VMS.init().then(() => {
            VMS.requireLogin();
            const user = VMS.getCurrentUser();
            if (user.role !== 'Admin') {
                window.location.href = 'index.html';
            }
            VMS.injectSidebar();

            function renderUsers() {
                const users = VMS.getUsers();
                const tbody = document.getElementById('user-table-body');

                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td><strong>${u.username}</strong></td>
                        <td>${u.full_name}</td>
                        <td><span class="badge badge-active">${u.role}</span></td>
                        <td>${u.email}</td>
                        <td>
                            ${u.username === 'admin' ? '<em>System</em>' : `<button onclick="deleteUser(${u.id})" style="padding:0.4rem 0.8rem; font-size:0.8rem; background:var(--danger);">Delete</button>`}
                        </td>
                    </tr>
                `).join('');
            }

            window.deleteUser = function (id) {
                if (confirm('Are you sure you want to delete this user?')) {
                    VMS.deleteUser(id);
                    renderUsers();
                }
            }

            document.getElementById('user-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const newUser = {
                    username: document.getElementById('new_username').value,
                    password: document.getElementById('new_password').value,
                    full_name: document.getElementById('new_fullname').value,
                    email: document.getElementById('new_email').value,
                    role: document.getElementById('new_role').value
                };

                VMS.addUser(newUser);
                document.getElementById('user-modal').style.display = 'none';
                renderUsers();
                alert('User account created successfully!');
            });

            renderUsers();
        });
    </script>
</body>

</html>
