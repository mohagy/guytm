<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Guyana VMS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js?v=1.3"></script>
</head>

<body
    style="display: flex; align-items: center; justify-content: center; background-color: var(--sidebar-bg); height: 100vh;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">GUYANA VMS</h2>
        <div id="login-error"
            style="color: var(--danger); margin-bottom: 1rem; display: none; text-align: center; font-size: 0.875rem;">
        </div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="admin, officer, or owner">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="123">
            </div>
            <button type="submit" id="login-btn" style="width: 100%; margin-top: 1rem;"
                disabled>Initializing...</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: #627d98;">
            Demo Passwords: 123 | <a href="#" onclick="VMS.resetData(); location.reload();"
                style="color: var(--danger);">Reset System Data</a>
        </p>
    </div>

    <script>
        function setupLogin() {
            const btn = document.getElementById('login-btn');
            btn.textContent = 'Login';
            btn.disabled = false;

            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;
                const errorDiv = document.getElementById('login-error');

                const result = VMS.login(user, pass);

                if (result.success) {
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                }
            });
        }

        const initPromise = VMS.init();
        if (initPromise && typeof initPromise.then === 'function') {
            initPromise.then(setupLogin);
        } else {
            // Fallback for old cached versions of app.js
            setupLogin();
        }
    </script>
</body>

</html>
